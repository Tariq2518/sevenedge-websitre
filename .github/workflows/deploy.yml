name: Deploy to Cloudflare Pages

# Auto-deploys the static export to the "sevenedge" Pages project on every push
# to main. Requires two repository secrets (Settings → Secrets and variables →
# Actions):
#   CLOUDFLARE_API_TOKEN   — a token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your account id

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://sevenedge.pages.dev

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=sevenedge --branch=main
